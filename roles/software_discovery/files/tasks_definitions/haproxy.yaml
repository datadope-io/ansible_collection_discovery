- name: Get conf_file_path from cmdline
  set_instance_fact:
    _conf_file_path: "<< __instance__.process.cmdline | regex_search('.*-f (.*haproxy\\.cfg|.*conf).*', '\\1', ignorecase=True) | first >>"
  ignore_errors: yes
- name: Read process environment
  read_environment_for_process:
    pid: "<< __instance__.process.pid >>"
  register: env_vars
  ignore_errors: yes
- name: Check if config file is accesible
  stat:
    path: "<< __instance__._conf_file_path >>"
  register: check_access
  when: __instance__._conf_file_path is defined
- name: Parse config file
  read_remote_file:
    file_path: "<< __instance__._conf_file_path >>"
    delegate_reading: yes
    parser: "custom"
    parser_params:
      module_name: "file_parser"
      module_args:
        parser: "haproxy"
        env_vars: "<< env_vars.parsed >>"
  register: config_file
  when: check_access is not failed
- name: Save parsed config file if necessary
  set_instance_fact:
      configuration: "<< config_file.parsed >>"
  when: config_file.parsed is defined

- name: Save config file
  add_file_info:
    path: '<<__instance__._conf_file_path | dirname>>'
    name: '<<__instance__._conf_file_path | basename>>'
    type: 'config'
    subtype: 'generic'
  when: __instance__._conf_file_path is defined

# Since config file is compiled and parsed on the destination machine, we have to read it in raw state to run regex
# against it
- name: Read raw config file
  read_remote_file:
    file_path: "<< __instance__._conf_file_path >>"
  register: raw_config_file
  when: __instance__._conf_file_path is defined

- name: Process raw config file
  block:
    - name: Try to get binded ports
      set_instance_fact:
        _binded_ports: "<< raw_config_file.content | regex_findall('bind +([0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]+|\\*:[0-9]+)', ignorecase=True) >>"
      ignore_errors: True
    - name: If no binded ports where found, try to gather listen ports
      set_instance_fact:
        _binded_ports: "<< raw_config_file.content | regex_findall('listen [\\w\\/\\.\\-]* ([0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]+|\\*:[0-9]+)', ignorecase=True) >>"
      ignore_errors: True
      when: "__instance__._binded_ports is not defined or __instance__._binded_ports | length == 0"
    - name: Register binded ports if necessary
      set_instance_fact:
        extra_data: "<< (__instance__.extra_data | default({})) | combine({
          'binded_ports': __instance__._binded_ports
        }) >>"
      when:
        - __instance__._binded_ports is defined
        - __instance__._binded_ports | length > 0

    - name: Try to get stats socket path
      set_instance_fact:
        _stats_socket_path: "<< raw_config_file.content | regex_search('.*stats socket (.*sock).*', '\\1', ignorecase=True) | first >>"
      ignore_errors: True
    - name: Register stats socket path if necessary
      set_instance_fact:
        extra_data: "<< (__instance__.extra_data | default({})) | combine({
          'stats_socket_path': __instance__._stats_socket_path
        }) >>"
      when: __instance__._stats_socket_path is defined

    - name: Try to get stats listen ip and port if socket path couldn't be found
      set_instance_fact:
        _stats_listen_ip: "<< raw_config_file.content | regex_search('listen stats ([0-9]*\\.[0-9]*\\.[0-9]*\\.[0-9]*):([0-9]*)', '\\1', ignorecase=True) | first >>"
        _stats_listen_port: "<< raw_config_file.content | regex_search('listen stats ([0-9]*\\.[0-9]*\\.[0-9]*\\.[0-9]*):([0-9]*)', '\\2', ignorecase=True) | first >>"
      ignore_errors: True
      when: __instance__._stats_socket_path is not defined
    - name: Register stats socket listen ip and port if necessary
      set_instance_fact:
        extra_data: "<< (__instance__.extra_data | default({})) | combine({
          'stats_listen_ip': __instance__._stats_listen_ip,
          'stats_listen_port': __instance__._stats_listen_port
        }) >>"
      when:
        - __instance__._stats_listen_ip is defined
        - __instance__._stats_listen_port is defined

    - name: Try to get stats credentials if socket path couldn't be found
      set_instance_fact:
        _stats_auth_user: "<< raw_config_file.content | regex_search('stats auth (.*):(.*)', '\\1', ignorecase=True) | first >>"
        _stats_auth_pass: "<< raw_config_file.content | regex_search('stats auth (.*):(.*)', '\\2', ignorecase=True) | first >>"
      ignore_errors: True
      when: __instance__._stats_socket_path is not defined
    - name: Register stats credentials if necessary
      set_instance_fact:
        extra_data: "<< (__instance__.extra_data | default({})) | combine({
          'stats_auth_user': __instance__._stats_auth_user,
          'stats_auth_pass': __instance__._stats_auth_pass
        }) >>"
      when:
        - __instance__._stats_auth_user is defined
        - __instance__._stats_auth_pass is defined

    - name: Print extra_data
      print_var:
        var: __instance__.extra_data
  when: raw_config_file is defined

- name: Remove temporary vars
  del_instance_fact:
    - _conf_file_path
    - _binded_ports
    - _stats_socket_path
    - _stats_listen_ip
    - _stats_listen_port
    - _stats_auth_user
    - _stats_auth_pass