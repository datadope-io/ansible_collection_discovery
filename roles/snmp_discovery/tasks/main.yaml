---
- name: Discovery SNMP
  block:
    - name: Install pysnmp python package on version 4.4.12
      ansible.builtin.pip:
        name: pysnmp=={{ snmp_pysnmp_version }}

    - name: SysobjectIDs file
      include_vars:
        file: "{{ snmp_sysobject_files_path }}/sysobject_ids.yaml"
        name: sysobject_ids

    - name: Enterprise-numbers file
      include_vars:
        file: "{{ snmp_sysobject_files_path }}/enterprise_numbers.json"
        name: enterprise_numbers

    - name: SNMP result facts
      debug:
        var: snmp_version

    - name: Gather facts with SNMP
      datadope.discovery.snmp_facts:
        host: "{{ snmp_host }}"
        port: "{{ snmp_port|int }}"
        timeout: "{{ snmp_timeout|int }}"
        retries: "{{ snmp_retries|int }}"
        version: "{{ snmp_version }}"
        community: "{{ snmp_community }}"
        security_level: "{{ snmp_security_level | default(omit) }}"
        username: "{{ snmp_username | default(omit) }}"
        integrity: "{{ snmp_integrity | default(omit) }}"
        authkey: "{{ snmp_authkey | default(omit) }}"
        privacy: "{{ snmp_privacy | default(omit) }}"
        privkey: "{{ snmp_privkey | default(omit) }}"
        context_name: "{{ snmp_context_name | default(omit) }}"
        context_engine_id: "{{ snmp_context_engine_id | default(omit) }}"
        sysobject_ids: "{{ sysobject_ids }}"
        templates_path: "{{ snmp_templates_path }}"
        _enterprise_numbers: "{{ enterprise_numbers }}"
